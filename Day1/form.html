<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body{
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            background-color:bisque;
        }
        /* class container */
        .container{
            width:400px;
            margin:auto;
            padding:20px;
            text-decoration:dotted;
            border:2px solid black;
        }
        /* id selector */
        #form-title{
            color:black;
            text-align:center;
        }
        /* Element selector */
        input{
            width:100%;
            padding:4px;
            margin-top:5px;
        }
        label{
            font-weight:bold;
        }
        .gender-options input{
            width:auto;
        }
        button{
            padding:10px;
            margin-top:5px;
            color:aliceblue;
            background-color:cadetblue;
        }
        button:hover{
            background-color:chocolate;
        }
    </style>
</head>

<body>

<h2 id="form-title">Student Registration Form</h2>
<div class="container">

<form action="">

    <label for="firstName">First Name</label>
    <input type="text" name="firstName" id="firstName" placeholder="Enter first name" required>
    <br><br>

    <label for="lastName">Last Name</label>
    <input type="text" name="lastName" id="lastName" placeholder="Enter last name" required>
    <br><br>

    <label for="email">E-Mail</label>
    <input type="email" name="email" id="email" placeholder="Enter email address" required>
    <br><br>

    <label for="phone">Phone Number</label>
    <input type="tel" name="phone" id="phone" placeholder="Enter phone number" required>
    <br><br>

    <label for="age">Age</label>
    <input type="number" name="age" id="age" min="18" required>
    <br><br>

    <label>Gender</label>
    <input type="radio" name="gender" id="male" value="male">
    <label for="male">Male</label>

    <input type="radio" name="gender" id="female" value="female">
    <label for="female">Female</label>
    <br><br>

    <label for="course">Course</label>
    <select name="course" id="course">
        <option value="">Select Course</option>
        <option value="ai">Artificial Intelligence</option>
        <option value="ml">Machine Learning</option>
        <option value="ds">Data Science</option>
        <option value="cys">Cyber Security</option>
    </select>
    <br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>
</div>
</body>
</html>
